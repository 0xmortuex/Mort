name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        # ziglang provides the C backend used for end-to-end and kernel tests.
        run: python -m pip install --upgrade pip pytest ziglang

      - name: Run the test suite
        run: python -m pytest tests/ -v

      - name: Build the MORT OS kernel
        run: python kernel/build.py check
