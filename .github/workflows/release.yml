name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and source archive
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify packaged compiler
        run: |
          python -m venv release-check
          release-check/bin/python -m pip install dist/*.whl
          release-check/bin/mortc --version
          release-check/bin/mortc std

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
